<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ChatGPT Fixture Code</title>
  </head>
  <body>
    <main>
      <section aria-label="Chat history" data-ecv-scroll-container style="height: 800px; overflow-y: auto;">
        <article data-turn-root data-message-author-role="user" style="min-height: 120px;"><div>Show the code block</div></article>
        <article data-turn-root data-message-author-role="assistant" style="min-height: 160px;">
          <div>
            <pre><code>const value = 42;</code></pre>
          </div>
        </article>
        <article data-turn-root data-message-author-role="user" style="min-height: 120px;"><div>Explain it</div></article>
        <article data-turn-root data-message-author-role="assistant" style="min-height: 120px;"><div>The code returns 42.</div></article>
      </section>
    </main>
  </body>
</html>
